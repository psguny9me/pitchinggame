<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배상훈 - 개인 기여도 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card-hover: #334155;
    --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8;
    --accent: #38bdf8; --accent2: #a78bfa;
    --green: #4ade80; --red: #f87171; --orange: #fb923c; --yellow: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link { display: inline-block; margin-bottom: 16px; font-size: 13px; color: var(--text-dim); }
  .back-link:hover { color: var(--accent); }
  .header { text-align: center; margin-bottom: 32px; padding: 32px 0 24px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text-dim); font-size: 14px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; transition: transform 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); background: var(--card-hover); }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .kpi-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  @media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr; } }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .chart-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .chart-card .subtitle { font-size: 12px; color: var(--text-dim); margin-top: -12px; margin-bottom: 16px; }
  .full-width { margin-bottom: 24px; }
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; overflow-x: auto; margin-bottom: 24px; }
  .table-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { font-weight: 600; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--card); }
  td:first-child, th:first-child { text-align: left; }
  tr:hover td { background: rgba(56, 189, 248, 0.05); }

  /* 히트맵 */
  .heatmap-wrap { overflow-x: auto; }
  .heatmap { border-collapse: collapse; font-size: 12px; width: 100%; }
  .heatmap th { padding: 6px 8px; font-size: 10px; color: var(--text-dim); text-transform: none; letter-spacing: 0; background: var(--card); position: sticky; top: 0; }
  .heatmap td { padding: 4px 6px; text-align: center; border: 1px solid var(--bg); border-radius: 4px; min-width: 44px; font-size: 11px; font-weight: 600; }
  .heatmap td:first-child { text-align: left; min-width: 120px; font-weight: 600; color: var(--text); background: transparent; border: none; }
  .heat-0 { background: transparent; color: var(--text-dim); }
  .heat-1 { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
  .heat-2 { background: rgba(56, 189, 248, 0.30); color: var(--accent); }
  .heat-3 { background: rgba(56, 189, 248, 0.50); color: #fff; }
  .heat-4 { background: rgba(56, 189, 248, 0.75); color: #fff; }
  .heat-5 { background: rgba(56, 189, 248, 1.0); color: #fff; }

  .footer { text-align: center; padding: 24px 0; border-top: 1px solid var(--border); margin-top: 24px; color: var(--text-dim); font-size: 12px; }
</style>
</head>
<body>

<a href="../index.html" class="back-link">← 전체 엔지니어 목록</a>

<div class="header">
  <h1>배상훈</h1>
  <p>2개 프로젝트 참여 | 2025-01-01_2025-12-31</p>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="grid-3">
  <div class="chart-card">
    <h3>서비스 영역별 기여도</h3>
    <p class="subtitle">커밋 기준</p>
    <canvas id="serviceChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>업무 유형 분석</h3>
    <p class="subtitle">커밋 메시지 기반</p>
    <canvas id="workTypeChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>커밋 등급 분포</h3>
    <p class="subtitle">S/A/B/C/D 비율</p>
    <canvas id="gradeDonutChart"></canvas>
  </div>
</div>

<div class="chart-card full-width">
  <h3>프로젝트 타임라인</h3>
  <p class="subtitle">월별 x 프로젝트 커밋 히트맵 — 어느 시기에 어느 프로젝트에 집중했는지</p>
  <div class="heatmap-wrap">
    <table class="heatmap" id="heatmapTable"></table>
  </div>
</div>

<div class="grid-2">
  <div class="chart-card">
    <h3>월별 활동 추이</h3>
    <p class="subtitle">전체 월별 커밋 수</p>
    <canvas id="monthlyChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>프로젝트별 등급 분포</h3>
    <p class="subtitle">각 프로젝트의 S/A/B/C/D 커밋 수</p>
    <canvas id="gradeByProjectChart"></canvas>
  </div>
</div>

<div class="table-card">
  <h3>프로젝트별 기여 상세</h3>
  <table id="projectTable"></table>
</div>

<div class="footer">
  Generated by contrib-analyzer | 배상훈 개인 기여도 대시보드
</div>

<script>
const person = {"name": "배상훈", "projects": {"jk-bizcenter-fe-web": {"commits": 106, "coding_commits": 86, "added": 82179, "deleted": 31391, "net": 50788, "mr": 0, "reviews": 38, "approvals": 36, "blame": 46170}, "jk-chat-bizcenter-fe": {"commits": 24, "coding_commits": 12, "added": 16605, "deleted": 1172, "net": 15433, "mr": 12, "reviews": 0, "approvals": 0, "blame": 16603}}, "monthly_matrix": {"2025-08": {"jk-bizcenter-fe-web": 8}, "2025-09": {"jk-bizcenter-fe-web": 13}, "2025-10": {"jk-bizcenter-fe-web": 18}, "2025-11": {"jk-bizcenter-fe-web": 34, "jk-chat-bizcenter-fe": 2}, "2025-12": {"jk-bizcenter-fe-web": 33, "jk-chat-bizcenter-fe": 22}}, "work_types": {"other": 52, "refactor": 6, "feat": 37, "fix": 3}, "grade_by_project": {"jk-bizcenter-fe-web": {"total": 86, "S": 0, "A": 21, "B": 61, "C": 4, "D": 0, "avg_score": 55.7, "value_sum": 4787}, "jk-chat-bizcenter-fe": {"total": 12, "S": 0, "A": 4, "B": 8, "C": 0, "D": 0, "avg_score": 55.7, "value_sum": 668}}, "service_contrib": {"비즈센터(BizCenter)": {"commits": 130, "net": 66221, "mr": 12, "reviews": 38}}, "total_commits": 130, "total_coding_commits": 98, "total_added": 98784, "total_deleted": 32563, "total_net": 66221, "total_mr": 12, "total_reviews": 38, "total_approvals": 36, "total_blame": 62773, "project_count": 2, "cv_total": 98, "cv_value_sum": 5455, "cv_S": 0, "cv_A": 25, "cv_B": 69, "cv_C": 4, "cv_D": 0, "cv_avg_score": 55.7, "cv_critical_pct": 25.5};
const allMonths = ["2025-01", "2025-02", "2025-03", "2025-04", "2025-05", "2025-06", "2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12", "2026-01"];
const serviceContrib = person.service_contrib || {};
const workTypes = person.work_types || {};
const monthlyMatrix = person.monthly_matrix || {};
const gradeByProject = person.grade_by_project || {};
const projects = person.projects || {};

const COLORS = [
  '#38bdf8','#a78bfa','#4ade80','#fb923c',
  '#f87171','#facc15','#2dd4bf','#f472b6',
  '#818cf8','#34d399','#e879f9','#fbbf24',
  '#67e8f9','#c084fc','#86efac','#fdba74',
];
const GRADE_COLORS = {S:'#fbbf24', A:'#a78bfa', B:'#38bdf8', C:'#fb923c', D:'#64748b'};

Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#334155';
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

// KPI 카드
const kpis = [
  {value: person.total_commits.toLocaleString(), label: '전체 커밋'},
  {value: person.project_count, label: '참여 프로젝트'},
  {value: person.total_net.toLocaleString(), label: '순 기여 라인'},
  {value: person.total_mr, label: 'MR 머지'},
  {value: (person.total_reviews + person.total_approvals), label: '리뷰 활동'},
  {value: person.cv_avg_score || '-', label: '평균 커밋 가치'},
  {value: person.cv_critical_pct ? person.cv_critical_pct + '%' : '-', label: '핵심커밋비율'},
];
document.getElementById('kpiGrid').innerHTML = kpis.map(k =>
  `<div class="kpi-card"><div class="kpi-value">${k.value}</div><div class="kpi-label">${k.label}</div></div>`
).join('');

// 서비스 영역별 기여도 (도넛)
const svcLabels = Object.keys(serviceContrib);
const svcValues = svcLabels.map(k => serviceContrib[k].commits);
if (svcLabels.length > 0) {
  new Chart(document.getElementById('serviceChart'), {
    type: 'doughnut',
    data: {
      labels: svcLabels,
      datasets: [{
        data: svcValues,
        backgroundColor: svcLabels.map((_, i) => COLORS[i % COLORS.length]),
        borderWidth: 0, hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {position: 'bottom', labels: {padding: 12, font: {size: 11}}},
      }
    }
  });
}

// 업무 유형 (파이)
const wtLabels = Object.keys(workTypes);
const wtValues = wtLabels.map(k => workTypes[k]);
const wtColorMap = {feat:'#4ade80', fix:'#f87171', refactor:'#a78bfa', test:'#38bdf8', chore:'#94a3b8', docs:'#facc15', style:'#f472b6', perf:'#fb923c', other:'#475569'};
if (wtLabels.length > 0) {
  new Chart(document.getElementById('workTypeChart'), {
    type: 'doughnut',
    data: {
      labels: wtLabels,
      datasets: [{
        data: wtValues,
        backgroundColor: wtLabels.map(l => wtColorMap[l] || '#475569'),
        borderWidth: 0, hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      plugins: {legend: {position: 'bottom', labels: {padding: 12, font: {size: 11}}}}
    }
  });
}

// 등급 도넛
const grades = ['S','A','B','C','D'];
const gradeValues = grades.map(g => person['cv_' + g] || 0);
if (gradeValues.some(v => v > 0)) {
  new Chart(document.getElementById('gradeDonutChart'), {
    type: 'doughnut',
    data: {
      labels: grades,
      datasets: [{
        data: gradeValues,
        backgroundColor: grades.map(g => GRADE_COLORS[g]),
        borderWidth: 0, hoverOffset: 8,
      }]
    },
    options: {
      responsive: true,
      plugins: {legend: {position: 'bottom', labels: {padding: 12, font: {size: 11}}}}
    }
  });
}

// 히트맵 렌더링
const projectIds = Object.keys(projects);
function heatClass(val, maxVal) {
  if (val === 0) return 'heat-0';
  const ratio = val / Math.max(maxVal, 1);
  if (ratio > 0.7) return 'heat-5';
  if (ratio > 0.5) return 'heat-4';
  if (ratio > 0.3) return 'heat-3';
  if (ratio > 0.1) return 'heat-2';
  return 'heat-1';
}

let allVals = [];
for (const m of allMonths) {
  for (const pid of projectIds) {
    allVals.push((monthlyMatrix[m] || {})[pid] || 0);
  }
}
const maxHeat = Math.max(...allVals, 1);

let heatHtml = '<thead><tr><th>프로젝트</th>';
for (const m of allMonths) {
  heatHtml += `<th>${m.slice(5)}</th>`;
}
heatHtml += '</tr></thead><tbody>';
for (const pid of projectIds) {
  heatHtml += `<tr><td>${pid}</td>`;
  for (const m of allMonths) {
    const v = (monthlyMatrix[m] || {})[pid] || 0;
    heatHtml += `<td class="${heatClass(v, maxHeat)}">${v || ''}</td>`;
  }
  heatHtml += '</tr>';
}
heatHtml += '</tbody>';
document.getElementById('heatmapTable').innerHTML = heatHtml;

// 월별 활동 추이 (라인)
const monthlyTotals = allMonths.map(m => {
  let sum = 0;
  for (const pid of projectIds) {
    sum += (monthlyMatrix[m] || {})[pid] || 0;
  }
  return sum;
});
new Chart(document.getElementById('monthlyChart'), {
  type: 'line',
  data: {
    labels: allMonths.map(m => m.slice(5)),
    datasets: [{
      label: '전체 커밋',
      data: monthlyTotals,
      borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)',
      fill: true, tension: 0.3, pointRadius: 4, pointHoverRadius: 6,
    }]
  },
  options: {
    responsive: true,
    plugins: {legend: {display: false}},
    scales: {y: {beginAtZero: true, grid: {color: '#1e293b'}}, x: {grid: {display: false}}}
  }
});

// 프로젝트별 등급 분포 (Stacked Horizontal Bar)
const gradeProjIds = Object.keys(gradeByProject);
if (gradeProjIds.length > 0) {
  new Chart(document.getElementById('gradeByProjectChart'), {
    type: 'bar',
    data: {
      labels: gradeProjIds,
      datasets: grades.map(g => ({
        label: g,
        data: gradeProjIds.map(pid => gradeByProject[pid][g] || 0),
        backgroundColor: GRADE_COLORS[g],
        borderRadius: 2,
      }))
    },
    options: {
      responsive: true, indexAxis: 'y',
      plugins: {legend: {position: 'top'}},
      scales: {
        x: {stacked: true, grid: {color: '#1e293b'}},
        y: {stacked: true}
      }
    }
  });
}

// 프로젝트별 상세 테이블
const projEntries = Object.entries(projects).sort((a,b) => b[1].commits - a[1].commits);
let tableHtml = `<thead><tr>
  <th>프로젝트</th><th>전체커밋</th><th>코딩커밋</th><th>추가라인</th><th>삭제라인</th>
  <th>순기여</th><th>MR머지</th><th>리뷰코멘트</th><th>MR승인</th>
`;
const hasGrades = gradeProjIds.length > 0;
if (hasGrades) tableHtml += '<th>평균가치</th><th>S</th><th>A</th>';
tableHtml += '</tr></thead><tbody>';
for (const [pid, d] of projEntries) {
  const g = gradeByProject[pid] || {};
  tableHtml += `<tr>
    <td style="font-weight:600">${pid}</td>
    <td>${d.commits.toLocaleString()}</td>
    <td>${d.coding_commits.toLocaleString()}</td>
    <td>${d.added.toLocaleString()}</td>
    <td>${d.deleted.toLocaleString()}</td>
    <td style="color:${d.net >= 0 ? 'var(--green)' : 'var(--red)'}">${d.net.toLocaleString()}</td>
    <td>${d.mr}</td>
    <td>${d.reviews}</td>
    <td>${d.approvals}</td>`;
  if (hasGrades) {
    tableHtml += `<td style="font-weight:700">${g.avg_score || '-'}</td>`;
    tableHtml += `<td style="color:#fbbf24;font-weight:600">${g.S || 0}</td>`;
    tableHtml += `<td style="color:#a78bfa">${g.A || 0}</td>`;
  }
  tableHtml += '</tr>';
}
tableHtml += '</tbody>';
document.getElementById('projectTable').innerHTML = tableHtml;
</script>
</body>
</html>
