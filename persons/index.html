<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card-hover: #334155;
    --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8;
    --accent: #38bdf8; --accent2: #a78bfa;
    --green: #4ade80; --red: #f87171; --orange: #fb923c; --yellow: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .back-link { display: inline-block; margin-bottom: 16px; font-size: 13px; color: var(--text-dim); }
  .back-link:hover { color: var(--accent); }
  .header { text-align: center; margin-bottom: 32px; padding: 32px 0 24px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--text-dim); font-size: 14px; }
  .person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .person-card {
    display: block; padding: 20px 24px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    text-decoration: none; color: var(--text); transition: all 0.2s;
  }
  .person-card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-2px); text-decoration: none; }
  .person-card .pc-name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .person-card .pc-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .person-card .pc-stat { text-align: center; }
  .person-card .pc-stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
  .person-card .pc-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .person-card .pc-projects { margin-top: 10px; font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .person-card .pc-arrow { float: right; color: var(--text-dim); font-size: 18px; margin-top: -24px; }
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; overflow-x: auto; margin-bottom: 24px; }
  .table-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { font-weight: 600; color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: var(--card); }
  td:first-child, th:first-child { text-align: left; }
  tr:hover td { background: rgba(56, 189, 248, 0.05); }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 6px; }
  .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
  .rank-2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); color: #000; }
  .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
  .rank-other { background: var(--border); color: var(--text-dim); }
  .footer { text-align: center; padding: 24px 0; border-top: 1px solid var(--border); margin-top: 24px; color: var(--text-dim); font-size: 12px; }
</style>
</head>

const rankBadge = (i) => {
  const cls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
  return `<span class="rank-badge ${cls}">${i+1}</span>`;
};

// 카드 렌더링
document.getElementById('personGrid').innerHTML = persons.map(p => {
  const projNames = Object.keys(p.projects).slice(0, 5).join(', ');
  const more = Object.keys(p.projects).length > 5 ? ` +${Object.keys(p.projects).length - 5}` : '';
  return `<a href="${encodeURIComponent(p.name)}/dashboard.html" class="person-card">
    <div class="pc-name">${p.name}<span class="pc-arrow">→</span></div>
    <div class="pc-stats">
      <div class="pc-stat"><div class="pc-stat-value">${p.total_commits.toLocaleString()}</div><div class="pc-stat-label">커밋</div></div>
      <div class="pc-stat"><div class="pc-stat-value">${p.project_count}</div><div class="pc-stat-label">프로젝트</div></div>
      <div class="pc-stat"><div class="pc-stat-value">${p.total_net.toLocaleString()}</div><div class="pc-stat-label">순기여</div></div>
      <div class="pc-stat"><div class="pc-stat-value">${p.total_mr}</div><div class="pc-stat-label">MR</div></div>
      <div class="pc-stat"><div class="pc-stat-value">${p.cv_avg_score || '-'}</div><div class="pc-stat-label">평균가치</div></div>
    </div>
    <div class="pc-projects">${projNames}${more}</div>
  </a>`;
}).join('');

// 순위 테이블
document.getElementById('rankTable').innerHTML = `
  <thead><tr>

    <th>순기여</th><th>MR</th><th>리뷰</th><th>평균가치</th><th>핵심비율</th>
  </tr></thead>
  <tbody>${persons.map((p, i) => `<tr>
    <td>${rankBadge(i)}</td>
    <td style="font-weight:600"><a href="${encodeURIComponent(p.name)}/dashboard.html">${p.name}</a></td>
    <td>${p.project_count}</td>
    <td>${p.total_commits.toLocaleString()}</td>
    <td>${p.total_coding_commits.toLocaleString()}</td>

  </tr>`).join('')}</tbody>
`;
