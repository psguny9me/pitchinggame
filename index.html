<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기여도 분석 대시보드</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8; --accent: #38bdf8; --accent2: #a78bfa; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
  .container { max-width: 600px; width: 100%; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }
  a { display: flex; align-items: center; gap: 16px; padding: 20px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; text-decoration: none; color: var(--text); margin-bottom: 16px; transition: all 0.2s; }
  a:hover { border-color: var(--accent); transform: translateY(-2px); }
  .icon { font-size: 28px; }
  .title { font-size: 16px; font-weight: 600; }
  .desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .arrow { margin-left: auto; color: var(--text-dim); font-size: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>Contribution Dashboard</h1>
  <p>개발자 기여도 분석 대시보드</p>
  <a href="summary_dashboard.html">
    <span class="icon">📊</span>
    <div><div class="title">프로젝트 종합 대시보드</div><div class="desc">전체 프로젝트 통합 기여도 분석</div></div>
    <span class="arrow">→</span>
  </a>
  <a href="persons/index.html">
    <span class="icon">👤</span>
    <div><div class="title">엔지니어별 대시보드</div><div class="desc">개인 단위 기여도, 프로젝트 타임라인, 서비스 기여도</div></div>
    <span class="arrow">→</span>
  </a>
</div>
</body>
</html>
